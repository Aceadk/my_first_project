name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flutter:
    name: Flutter - analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Static analysis
        run: flutter analyze
      - name: Run unit tests
        run: flutter test --coverage
      - name: Run startup cold-launch guard
        run: flutter test test/startup_cold_launch_guard_test.dart -r compact
      - name: Check Flutter dependency freshness
        run: dart pub outdated --no-dev-dependencies
        continue-on-error: true

  functions:
    name: Functions - build & test
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            functions/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install functions dependencies
        working-directory: functions
        run: npm ci
      - name: Lint functions
        working-directory: functions
        run: npm run lint
      - name: Run functions tests (build included)
        working-directory: functions
        run: npm test
      - name: Check for dependency vulnerabilities
        working-directory: functions
        run: npm audit --audit-level=high
        continue-on-error: true

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets in code
        run: |
          # Search for common secret patterns (fail if found)
          if grep -rn --include='*.ts' --include='*.dart' --include='*.js' \
            -E '(sk_live_[a-zA-Z0-9]{20,}|re_[a-zA-Z0-9]{20,}|whsec_[a-zA-Z0-9]{20,})' \
            --exclude-dir=node_modules --exclude-dir=.dart_tool \
            lib/ functions/src/ 2>/dev/null; then
            echo "::error::Live secrets found in source code!"
            exit 1
          fi
          echo "No secrets found in source code."
      - name: Verify .env files are not tracked
        run: |
          # Ensure no .env files with secrets are tracked
          tracked_envs=$(git ls-files '*.env' 'functions/.env' '.env.local' 2>/dev/null || true)
          if [ -n "$tracked_envs" ]; then
            echo "::warning::The following .env files are tracked by git: $tracked_envs"
          fi
      - name: Validate Firestore rules syntax
        run: |
          # Basic syntax check for Firestore rules
          if [ -f "firestore.rules" ]; then
            echo "Firestore rules file found - checking for common issues..."
            # Check for overly permissive rules
            if grep -q 'allow read, write: if true' firestore.rules; then
              echo "::error::Overly permissive Firestore rule found (allow read, write: if true)"
              exit 1
            fi
            echo "Basic Firestore rules check passed."
          fi
