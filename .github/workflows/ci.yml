name: CI
on:
  push:
    branches: [ main, release, 'release/**', 'release-*' ]
    tags: [ 'v*', 'release-*' ]
  pull_request:
    branches: [ main ]

jobs:
  docs_sync:
    name: Docs sync guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run docs sync guard
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            RANGE="origin/${{ github.base_ref }}...HEAD"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            RANGE="HEAD^..HEAD"
          else
            echo "No previous commit found; using tracked files as the initial change set."
            RANGE=""
          fi

          if [[ -n "${RANGE}" ]]; then
            scripts/check_ai_docs_sync.sh --range "${RANGE}"
          else
            mapfile -t FILES < <(git ls-files)
            scripts/check_ai_docs_sync.sh --files "${FILES[@]}"
          fi

  flutter:
    name: Flutter - analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Static analysis
        run: flutter analyze
      - name: Run accessibility regression lane
        run: flutter test test/accessibility_regression_lane_test.dart -r compact
      - name: Run unit tests
        run: flutter test --coverage
      - name: Generate coverage hotspot artifact
        run: dart run tool/coverage_summary.dart --artifact=coverage_logic_lowest_raw.txt
      - name: Verify coverage hotspot artifact is up to date
        run: git diff --exit-code -- coverage_logic_lowest_raw.txt
      - name: Check Flutter dependency freshness
        run: dart pub outdated --no-dev-dependencies
        continue-on-error: true

  startup_guard:
    name: Startup guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run startup cold-launch guard
        run: flutter test test/startup_cold_launch_guard_test.dart -r compact

  functions:
    name: Functions - build & test
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            functions/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install functions dependencies
        working-directory: functions
        run: npm ci
      - name: Lint functions
        working-directory: functions
        run: npm run lint
      - name: Run functions tests (build included)
        working-directory: functions
        run: npm test
      - name: Run security abuse regression lane
        working-directory: functions
        run: npm run test:security
      - name: Check for dependency vulnerabilities
        working-directory: functions
        run: npm audit --audit-level=high
        continue-on-error: true

  firestore_rules:
    name: Firestore rules - emulator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      - name: Install rules-test dependencies
        working-directory: firestore-tests
        run: npm install
      - name: Run Firestore rules emulator tests
        working-directory: firestore-tests
        run: npm test

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Firestore rules parity
        run: scripts/check_firestore_rules_sync.sh
      - name: Verify deprecated env aliases allowlist
        run: scripts/check_deprecated_env_aliases.sh
      - name: Verify env alias migration checkpoint
        run: scripts/check_env_alias_migration_status.sh
      - name: Verify production cutover ticket template contract
        run: scripts/check_release_cutover_ticket_contract.sh
      - name: Verify concrete cutover ticket on release refs
        run: scripts/check_release_cutover_ticket_release_ref_gate.sh
        env:
          RELEASE_CUTOVER_TICKET_PATH: ${{ vars['RELEASE_CUTOVER_TICKET_PATH'] }}
      - name: Test release-ref gate script behavior
        run: scripts/test_release_cutover_ticket_release_ref_gate.sh
      - name: Test release cutover invalid-input cases
        run: scripts/test_release_cutover_ticket_invalid_input_cases.sh
      - name: Check for secrets in code
        run: |
          # Search for common secret patterns (fail if found)
          if grep -rn --include='*.ts' --include='*.dart' --include='*.js' \
            -E '(sk_live_[a-zA-Z0-9]{20,}|re_[a-zA-Z0-9]{20,}|whsec_[a-zA-Z0-9]{20,})' \
            --exclude-dir=node_modules --exclude-dir=.dart_tool \
            lib/ functions/src/ 2>/dev/null; then
            echo "::error::Live secrets found in source code!"
            exit 1
          fi
          echo "No secrets found in source code."
      - name: Verify .env files are not tracked
        run: |
          # Ensure no .env files with secrets are tracked
          tracked_envs=$(git ls-files '*.env' 'functions/.env' '.env.local' 2>/dev/null || true)
          if [ -n "$tracked_envs" ]; then
            echo "::warning::The following .env files are tracked by git: $tracked_envs"
          fi
      - name: Validate Firestore rules syntax
        run: |
          # Basic syntax check for Firestore rules
          if [ -f "firestore.rules" ]; then
            echo "Firestore rules file found - checking for common issues..."
            # Check for overly permissive rules
            if grep -q 'allow read, write: if true' firestore.rules; then
              echo "::error::Overly permissive Firestore rule found (allow read, write: if true)"
              exit 1
            fi
            echo "Basic Firestore rules check passed."
          fi
