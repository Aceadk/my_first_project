name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flutter:
    name: Flutter - analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Static analysis
        run: flutter analyze
      - name: Run unit tests
        run: flutter test --coverage

  functions:
    name: Functions - build & test
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            functions/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install functions dependencies
        working-directory: functions
        run: npm ci
      - name: Lint functions
        working-directory: functions
        run: npm run lint
      - name: Run functions tests (build included)
        working-directory: functions
        run: npm test
