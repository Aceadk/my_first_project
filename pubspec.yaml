name: crushhour
description: A Flutter prototype for the CrushHour experience.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  intl: ^0.20.2
  uuid: ^4.5.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  app_links: ^6.3.2
  permission_handler: ^11.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  video_player: ^2.8.7
  file_picker: ^10.3.8
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_messaging: ^16.1.0
  cloud_firestore: ^6.1.1
  cloud_functions: ^6.0.5
  firebase_storage: ^13.0.2
  firebase_analytics: ^12.1.0
  firebase_remote_config: ^6.1.3
  firebase_performance: ^0.11.0+3
  firebase_crashlytics: ^5.0.3
  package_info_plus: ^8.3.1
  # Notifications
  flutter_local_notifications: ^18.0.1
  # Email
  mailer: ^6.2.0
  # Real-time
  web_socket_channel: ^3.0.1
  # Animations
  confetti: ^0.7.0
  lottie: ^3.1.3
  # Audio
  record: ^6.0.0
  just_audio: ^0.9.42
  audio_waveforms: ^1.2.0
  path_provider: ^2.1.4
  # Security
  crypto: ^3.0.3
  # Sharing
  share_plus: ^10.0.0
  # In-app review
  in_app_review: ^2.0.9

flutter:
  uses-material-design: true
  assets:
    - assets/animations/

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  firebase_core_platform_interface: ^6.0.2
