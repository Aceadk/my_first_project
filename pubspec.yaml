name: crushhour
description: A Flutter prototype for the CrushHour experience.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  intl: ^0.20.2
  uuid: ^4.5.0
  path: ^1.9.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  app_links: ^6.3.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  video_player: ^2.8.7
  flutter_secure_storage: ^10.0.0
  go_router: ^17.0.1
  google_fonts: ^8.0.0
  cached_network_image: ^3.3.1
  image: ^4.2.0 # JPEG re-encode in ImageOptimizer (PERF-004)
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0
  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_messaging: ^16.1.0
  cloud_firestore: ^6.1.1
  cloud_functions: ^6.0.5
  firebase_storage: ^13.0.2
  firebase_analytics: ^12.1.0
  firebase_remote_config: ^6.1.3
  firebase_performance: ^0.11.0+3
  firebase_crashlytics: ^5.0.3
  firebase_database: ^12.1.1
  firebase_app_check: ^0.4.1+3
  package_info_plus: ^8.3.1
  # Notifications
  flutter_local_notifications: ^20.0.0
  # Email
  mailer: ^6.2.0
  # Real-time
  web_socket_channel: ^3.0.1
  # Animations
  lottie: ^3.1.3
  # Audio
  record: ^6.0.0
  just_audio: ^0.9.42
  path_provider: ^2.1.4
  # Security
  crypto: ^3.0.3
  cryptography: ^2.7.0
  # Sharing
  share_plus: ^10.0.0
  # In-app review
  in_app_review: ^2.0.12
  local_auth: ^3.0.1
  json_annotation: ^4.11.0
  in_app_purchase: ^3.2.3
  in_app_purchase_storekit: ^0.4.8+1
  in_app_purchase_android: ^0.4.0+8

flutter:
  uses-material-design: true
  generate: true
  config:
    enable-swift-package-manager: false
  assets:
    - assets/animations/
    - assets/icons/google_logo.png
    - assets/icons/splash_screen.png

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  firebase_core_platform_interface: ^6.0.2
  firebase_analytics_platform_interface: any
  cloud_functions_platform_interface: any
  geocoding_platform_interface: any
  geolocator_platform_interface: any
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.4.4
  fake_async: ^1.3.1

# App launcher icon configuration.
# Run `dart run tool/generate_app_icons.dart`, then
# `dart run flutter_launcher_icons` after changing source logo assets.
  firebase_database_platform_interface: any
  plugin_platform_interface: any
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0D0E12"
  # Transparent heart-only foreground, pre-sized to the safe zone, so it must be
  # placed with NO extra inset (the heart already accounts for the safe zone).
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false
  # NOTE: the legacy square mipmaps (API < 26) are generated from image_path
  # (app_icon.png), which carries the decorative glow; those mipmaps were
  # hand-corrected to a clean tile+heart. Re-run with a clean image_path if you
  # need to regenerate them.
